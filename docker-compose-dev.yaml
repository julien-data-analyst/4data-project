
services:
  postgres:
    image: postgres:15
    container_name: postgres_informatics_companies
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: annual_french_informatics_companies
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dagster:
    build:
      context: ./dagster-informatics-companies
    container_name: dagster
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_USER: postgres
      DAGSTER_POSTGRES_PASSWORD: postgres
      DAGSTER_POSTGRES_DB: annual_french_informatics_companies
      DBT_PROFILES_DIR: /dbt
    ports:
      - "3000:3000"
    volumes:
      # code dagster (hot reload)
      - ./dagster-informatics-companies:/app

      # projet dbt (TRÈS IMPORTANT)
      - ./dbt_informatics_companies:/dbt

    command: uv run dg dev -h 0.0.0.0 -p 3000

volumes:
  postgres_data: